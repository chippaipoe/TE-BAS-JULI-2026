<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown & Live Voting System Official</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 0 40px rgba(56, 189, 248, 0.1);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 440px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        h1, h2 {
            margin-top: 0;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 { font-size: 1.6rem; margin-bottom: 20px; }
        h2 { font-size: 1.3rem; margin-bottom: 15px; color: #a78bfa; }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        input[type="number"] {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #1e293b;
            color: #fff;
            width: 90px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            outline: none;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 24px;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-start { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); }
        .btn-reset { background: linear-gradient(135deg, #64748b 0%, #475569 100%); }
        .btn-vote { background: linear-gradient(135deg, #10b981 0%, #059669 100%); width: 100%; }

        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled {
            background: #475569 !important;
            color: #94a3b8 !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .countdown-flex {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
        }

        .time-box {
            background: #111827;
            padding: 15px;
            border-radius: 12px;
            min-width: 80px;
            border-bottom: 4px solid #38bdf8;
        }

        .number {
            font-size: 2.8rem;
            font-weight: 800;
            font-family: monospace;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            display: block;
            margin-top: 5px;
        }

        .voting-flex {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .team-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .vote-count { font-size: 2.2rem; font-weight: 800; color: #34d399; margin-bottom: 15px; }
        #user-status { margin-top: 15px; font-size: 0.9rem; font-weight: 500; color: #fbbf24; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .time-up-container { animation: shake 0.5s ease-in-out infinite; border-color: #ef4444; }
        .time-up-box { border-bottom-color: #ef4444 !important; }
        .time-up-number { color: #ef4444; }
    </style>
</head>
<body>

    <!-- BOX 1: COUNTDOWN TIMER CONTROLLER -->
    <div class="container" id="timer-container">
        <h1>Waktu Pemilihan</h1>
        
        <div class="input-group">
            <input type="number" id="minutes-input" min="1" max="60" value="5">
        </div>

        <div class="button-group">
            <button class="btn-start" onclick="startTimer()">MULAI</button>
            <button class="btn-reset" onclick="resetTimer()">RESET</button>
        </div>

        <div class="countdown-flex">
            <div class="time-box" id="box-min">
                <span id="display-minutes" class="number">05</span>
                <span class="label">Menit</span>
            </div>
            <div class="time-box" id="box-sec">
                <span id="display-seconds" class="number">00</span>
                <span class="label">Detik</span>
            </div>
        </div>
    </div>

    <!-- BOX 2: LIVE VOTING SYSTEM -->
    <div class="container">
        <h2>Live Voting Skor</h2>
        <div id="user-status">Memeriksa tautan peserta...</div>
        
        <div class="voting-flex">
            <div class="team-card">
                <div class="team-name" style="color: #f43f5e;">TIM A</div>
                <div class="vote-count" id="score-teamA">0</div>
                <button class="btn-vote" id="btn-teamA" onclick="submitVote('teamA')" disabled>VOTE</button>
            </div>
            <div class="team-card">
                <div class="team-name" style="color: #06b6d4;">TIM B</div>
                <div class="vote-count" id="score-teamB">0</div>
                <button class="btn-vote" id="btn-teamB" onclick="submitVote('teamB')" disabled>VOTE</button>
            </div>
        </div>
    </div>

    <!-- Script SDK Firebase Kompatibel -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // Konfigurasi Database Milik Anda yang Sudah Terintegrasi
        const firebaseConfig = {
            apiKey: "AIzaSyDFQvJ9K7mEOwF1Q3U6OddbXKMuT9Opdqg",
            authDomain: "db-te-bas-juli-2026.firebaseapp.com",
            databaseURL: "https://db-te-bas-juli-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "db-te-bas-juli-2026",
            storageBucket: "db-te-bas-juli-2026.firebasestorage.app",
            messagingSenderId: "523158894524",
            appId: "1:523158894524:web:01e584f701fb6579f5ddb9",
            measurementId: "G-6RCDPY9HBT"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');

        let countdownInterval = null;
        let alarmInterval = null;
        let audioCtx = null;
        let timerActive = false;

        // Mendengarkan Pembaruan Skor Secara Live
        database.ref('votes/scores').on('value', (snapshot) => {
            const data = snapshot.val() || { teamA: 0, teamB: 0 };
            document.getElementById('score-teamA').innerText = data.teamA;
            document.getElementById('score-teamB').innerText = data.teamB;
        });

        function startTimer() {
            clearInterval(countdownInterval);
            stopAlarm();
            clearVisualEffects();

            const inputMinutes = parseInt(document.getElementById("minutes-input").value);
            if (isNaN(inputMinutes) || inputMinutes <= 0) {
                alert("Masukkan menit yang valid!");
                return;
            }

            let totalSeconds = inputMinutes * 60;
            timerActive = true;
            updateDisplay(totalSeconds);
            checkUserVotingStatus();

            countdownInterval = setInterval(() => {
                totalSeconds--;
                updateDisplay(totalSeconds);

                if (totalSeconds <= 0) {
                    clearInterval(countdownInterval);
                    timerActive = false;
                    activateTimeUpEffects();
                    disableVotingButtons("Waktu pemilihan telah habis! 🚨");
                    playAlarmLoop();
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(countdownInterval);
            stopAlarm();
            timerActive = false;
            clearVisualEffects();
            
            const inputMinutes = parseInt(document.getElementById("minutes-input").value) || 5;
            updateDisplay(inputMinutes * 60);
            checkUserVotingStatus();
        }

        function checkUserVotingStatus() {
            const statusDiv = document.getElementById('user-status');
            
            if (!userId) {
                disableVotingButtons("Akses Ditolak: Anda perlu tautan khusus (?user=nama)");
                return;
            }

            if (!timerActive) {
                disableVotingButtons("Tombol Terkunci: Waktu countdown belum dimulai.");
                return;
            }

            database.ref('votes/voters/' + userId).once('value').then((snapshot) => {
                if (snapshot.exists()) {
